name: rent_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter 

  #UI
  cupertino_icons: ^1.0.8
  toastification: ^3.0.3
  google_fonts: ^6.3.3

  # Navigation
  go_router: ^17.0.1

  # Storage
  flutter_secure_storage: ^10.0.0

  # API Communication
  dio: ^5.9.0
  provider: ^6.1.5+1
  freezed: ^3.2.4

  # Permissions
  permission_handler: ^12.0.1

  # Internationalization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  intl_utils: ^2.8.8

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

flutter_intl:
  enabled: true